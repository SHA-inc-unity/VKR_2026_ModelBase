# ─────────────────────────────────────────────────────────────────────────────
# Реестр микросервисов
#
# Формат строки:
#   <service_name>  <path_relative_to_repo_root>
#
# service_name — короткое имя для команд (start/stop/restart/update/status)
# path         — путь от корня репозитория до папки с docker-compose.yml
#
# Пример добавления нового сервиса:
#   microservice_gateway  microservice_gateway
# ─────────────────────────────────────────────────────────────────────────────

microservice_analitic   microservice_analitic
microservice_account   microservice_account
microservice_gateway   microservice_gateway
