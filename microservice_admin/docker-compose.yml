# microservice_admin — standalone docker-compose.
#
# TypeScript / Next.js 14 admin panel.
# IPC: Kafka only. Requires `microservice_infra` running — оно поднимает
# Redpanda, MinIO, общий `modelline_net` и **nginx-вход на host-порте
# 8501**, который и проксирует /admin/* в этот контейнер.
#
# В local/full stack сервис `admin` не публикует порты в хост: browser
# идёт через nginx из microservice_infra на http://localhost:8501/admin/.
# Для split deployment ниже есть отдельный сервис `admin-online`, который
# публикует `${ADMIN_PORT:-443}:3000` и работает без `modelline_net`.
#
# Run:
#   cd microservice_admin
#   docker compose up -d --build
#   → http://localhost:8501/admin/   (через nginx-вход infra)
#   docker compose --profile online up -d --build admin-online
#   → http://localhost:443/admin/    (отдельная online-head нода)

services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      REDPANDA_ADMIN_URL: ${REDPANDA_ADMIN_URL:-redpanda:9644}
      ACCOUNT_URL: ${ACCOUNT_URL:-account_service_api:5000}
      GATEWAY_URL: ${GATEWAY_URL:-exchange-gateway:5020}
      BACKEND_CONNECTION_TARGET: localhost
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # MinIO URL used by /api/health liveness probe.
      MINIO_URL: ${MINIO_URL:-minio:9000}
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - modelline_net

  # Online admin head for split deployment.
  #
  # Used when the backend stack runs elsewhere (`noadmin`) and this host
  # should run only the browser-facing admin panel. In this mode the
  # container publishes its own host port and talks to external Kafka / HTTP
  # endpoints via the ONLINE_* env namespace. No shared `modelline_net`
  # attachment is required.
  admin-online:
    profiles: ["online"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${ONLINE_KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
      REDPANDA_ADMIN_URL: ${ONLINE_REDPANDA_ADMIN_URL:-localhost:9644}
      ACCOUNT_URL: ${ONLINE_ACCOUNT_URL:-localhost:7510}
      GATEWAY_URL: ${ONLINE_GATEWAY_URL:-localhost:7520}
      BACKEND_CONNECTION_TARGET: ${ONLINE_BACKEND_HOST:-localhost}
      REDIS_URL: ${ONLINE_REDIS_URL:-}
      # Used only by /api/health; may point to a remote MinIO endpoint.
      MINIO_URL: ${ONLINE_MINIO_URL:-localhost:9000}
      NODE_ENV: production
    ports:
      - "${ADMIN_PORT:-443}:3000"

  # ── VPN client (WireGuard) ───────────────────────────────────────────────────
  # Profile: vpn.  Only active in split deployment (onlyadmin with join token).
  # Brings up wg0 on the HOST so admin-online (Docker bridge network) can reach
  # the backend's WireGuard IP (10.44.0.1) via host routing — no changes to the
  # admin-online container or its network attachment are required.
  #
  # Runtime contract: same as vpn-server (NET_ADMIN, SYS_MODULE, /dev/net/tun).
  #
  # wg0.conf is written by the launcher when a join token is provided:
  #   .runtime-data/microservice_admin/vpn/wg0.conf
  vpn-client:
    profiles: ["vpn"]
    image: alpine:3.19
    container_name: modelline-vpn-client
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - type: bind
        source: ../.runtime-data/microservice_admin/vpn
        target: /vpn/state
      - type: bind
        source: ./vpn/client-entrypoint.sh
        target: /entrypoint.sh
        read_only: true
      - /lib/modules:/lib/modules:ro
    entrypoint: ["sh", "-c"]
    command:
      - "apk add --no-cache wireguard-tools iproute2-minimal kmod && exec sh /entrypoint.sh"
    restart: unless-stopped

networks:
  modelline_net:
    name: modelline_net
    external: true
