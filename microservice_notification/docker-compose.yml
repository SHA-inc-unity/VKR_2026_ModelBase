version: "3.9"

services:
  notification-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_service_api
    restart: unless-stopped
    ports:
      - "${NOTIF_BIND_ADDR:-0.0.0.0}:${NOTIF_API_PORT:-7550}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-account-service}
      Jwt__Audience: ${JWT_AUDIENCE:-exchange-app}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      Kafka__SocialEventsTopic: ${KAFKA_SOCIAL_TOPIC:-events.social.v1}
      Kafka__NewsEventsTopic: ${KAFKA_NEWS_TOPIC:-events.news.v1}
      Kafka__GroupId: ${KAFKA_GROUP_ID:-notification-service}
      SocialService__BaseUrl: ${SOCIAL_BASE_URL:-http://social_service_api:5000}
      SocialService__InternalApiKey: ${INTERNAL_API_KEY}
      Gateway__BaseUrl: ${GATEWAY_BASE_URL:-http://exchange-gateway:5000}
      PriceWatcher__PollIntervalSeconds: ${PRICE_WATCHER_POLL_SECONDS:-300}
      PriceWatcher__Enabled: ${PRICE_WATCHER_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1388 ' /proc/net/tcp /proc/net/tcp6 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - notif_net
      - modelline_net

  postgres:
    image: postgres:16-alpine
    container_name: notification_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notification_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - type: bind
        source: ../.runtime-data/microservice_notification/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-notification_service}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notif_net

networks:
  notif_net:
    driver: bridge
  modelline_net:
    name: modelline_net
    external: true
