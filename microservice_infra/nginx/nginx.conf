# nginx reverse proxy — единый внешний вход в ModelLine.
#
# Слушает контейнерный порт 80 и публикуется как host-порт 8501 (см.
# docker-compose). Это **единственный** browser-facing вход:
# admin не публикует свои 3000 наружу, MinIO не публикует свои 9000.
#
# Маршруты:
#   /                       → 301 → /admin/
#   /admin                  → 301 → /admin/
#   /admin/                 → admin:3000 (Next.js, basePath=/admin)
#   /admin/api/events       → admin:3000 (SSE, без буферизации)
#   /modelline-blobs/*      → minio:9000 (signed object downloads,
#                              path/query сохраняются как есть)
#
# Никакой прокачки байтов через admin: data-service выдаёт presigned URL
# с host-частью текущего внешнего входа (PUBLIC_DOWNLOAD_BASE_URL), и
# браузер качает напрямую из MinIO через этот же origin.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Большие dataset-export файлы могут быть многогигабайтными — не
    # ограничиваем тело клиента (download — это GET, но MinIO multipart
    # ответы лучше пускать без лимита).
    client_max_body_size 0;

    # Gzip только для статики; CSV/ZIP уже идут как application/octet-stream.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker's embedded DNS (127.0.0.11) — позволяет nginx стартовать,
    # даже если `admin` контейнер ещё не поднят (его compose-стек
    # отдельный от infra). Без этого `proxy_pass http://admin:3000;`
    # резолвится один раз при загрузке конфига, и nginx падает с
    # "host not found in upstream".
    #
    # Резолвинг через переменную ($upstream_admin) переносит lookup на
    # время первого запроса — admin может появляться/перезапускаться
    # независимо, nginx не нужно рестартовать.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80 default_server;
        server_name _;

        # Root → admin panel
        location = / {
            return 301 /admin/;
        }

        # Bare /admin without trailing slash
        location = /admin {
            return 301 /admin/;
        }

        # SSE — должен идти ДО общего /admin блока.
        # proxy_buffering off обязателен — SSE требует streaming.
        location /admin/api/events {
            set $upstream_admin admin:3000;
            proxy_pass         http://$upstream_admin;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
        }

        # Claim-check object downloads. Прокидываем подписанный bucket
        # path/query как есть, но публикуем через тот же внешний origin,
        # на котором живёт admin-панель — браузер не видит сырой порт
        # MinIO 9000 и не зависит от его hostname.
        #
        # proxy_buffering/request_buffering off + read_timeout=3600s
        # позволяют корректно стримить многогигабайтные CSV/ZIP без
        # промежуточной материализации в nginx и без таймаутов.
        location /modelline-blobs/ {
            set $upstream_minio minio:9000;
            proxy_pass                http://$upstream_minio;
            proxy_http_version        1.1;
            proxy_set_header          Host $host;
            proxy_set_header          X-Real-IP $remote_addr;
            proxy_set_header          X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header          X-Forwarded-Proto $scheme;
            proxy_buffering           off;
            proxy_request_buffering   off;
            proxy_read_timeout        3600s;
        }

        # Все прочие /admin/* (страницы, _next/static, API).
        location /admin {
            set $upstream_admin admin:3000;
            proxy_pass         http://$upstream_admin;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
