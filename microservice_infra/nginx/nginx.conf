# nginx reverse proxy — ModelLine
#
# Routes:
#   sha-trade.tech/          → 301 → /admin/
#   sha-trade.tech/admin     → 301 → /admin/
#   sha-trade.tech/admin/    → proxy → admin:3000 (Next.js, basePath=/admin)
#   sha-trade.tech/admin/api/events → proxy (SSE, no buffering)
#
# Requires: admin container on modelline_net, Next.js built with basePath=/admin
# HTTPS: point Certbot at /etc/nginx/conf.d/ssl.conf (mount separately).

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name sha-trade.tech;

        # Root → admin panel
        location = / {
            return 301 /admin/;
        }

        # Bare /admin without trailing slash
        location = /admin {
            return 301 /admin/;
        }

        # SSE — must come BEFORE the generic /admin block
        # proxy_buffering off is critical: SSE requires streaming
        location /admin/api/events {
            proxy_pass         http://admin:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # SSE: disable keep-alive upgrade, disable buffering
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
        }

        # All other /admin/* routes (pages, _next/static, API)
        location /admin {
            proxy_pass         http://admin:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
