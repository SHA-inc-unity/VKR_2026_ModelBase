# microservice_infra — shared infrastructure layer.
#
# Runs the common pieces every other service depends on:
#   - Redpanda   : Kafka-API compatible broker (KRaft, single node)
#   - Redpanda Console : Web UI for topics / consumers (http://localhost:8080)
#   - MinIO      : S3-compatible object store for claim-check payloads
#   - MinIO Console    : Web UI (http://localhost:9001)
#
# Creates the shared docker network `modelline_net`. Other services attach
# to it as `external: true`.
#
# Run (from this folder):
#   docker compose up -d
#
# Broker endpoint (inside network): redpanda:9092
# S3   endpoint (inside network)  : http://minio:9000

services:
  redpanda:
    image: redpandadata/redpanda:v24.1.9
    container_name: redpanda
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - "2G"
      - --reserve-memory
      - "200M"
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,EXTERNAL://${REDPANDA_EXTERNAL_HOST:-localhost}:${REDPANDA_EXTERNAL_PORT:-9092}
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    # Loopback-only by default: backend services use the internal listener
    # redpanda:29092 (docker network); nothing off-host needs the external
    # :9092/:9644 (the admin head reads events via the gateway SSE relay, not
    # Kafka directly). Set REDPANDA_BIND_ADDR=0.0.0.0 to expose if ever needed.
    ports:
      - "${REDPANDA_BIND_ADDR:-127.0.0.1}:${REDPANDA_EXTERNAL_PORT:-9092}:9092"
      - "${REDPANDA_BIND_ADDR:-127.0.0.1}:${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - type: bind
        source: ../.runtime-data/microservice_infra/redpanda
        target: /var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - modelline_net

  # One-shot: raise the per-shard partition budget so the single-node broker
  # can host many ephemeral reply.* topics without tripping error_code=37
  # ("Can not increase partition count due to memory limit").
  redpanda-init:
    image: redpandadata/redpanda:v24.1.9
    container_name: redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set -e
        rpk --api-urls redpanda:9644 cluster config set topic_partitions_per_shard 10000
        rpk --api-urls redpanda:9644 cluster config set auto_create_topics_enabled true
        echo "✓ redpanda cluster config applied"
    restart: "no"
    networks:
      - modelline_net

  # Periodic cleanup of orphaned ephemeral reply-inbox topics.
  #
  # After the long-lived reply-inbox migration each application service
  # owns ONE reply.<service>.<uuid> topic for its entire process lifetime,
  # so the per-call topic churn is gone. The janitor still exists to mop
  # up topics from older builds that crashed before they could clean up.
  #
  # Safety properties of the new sweep:
  #   1. Interval is 6 h — we no longer need an aggressive sweep because
  #      only a handful of long-lived inboxes exist at any time.
  #   2. The sweep skips any topic that has activity in the last hour
  #      (HighWatermark advanced) — that filter alone protects every
  #      currently-running consumer, including ones in the middle of a
  #      multi-minute repair operation.
  #   3. Failed deletions are swallowed and logged, never crash-loop.
  redpanda-janitor:
    image: redpandadata/redpanda:v24.1.9
    container_name: redpanda-janitor
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        # Reply topics older than this are candidates for deletion.
        # 6 h is well past the longest legitimate request/repair window.
        STALE_AGE_SEC=21600
        SLEEP_SEC=21600
        while true; do
          sleep "$$SLEEP_SEC"
          NOW_MS=$$(date +%s%3N)
          # List all reply-inbox topics — empty/missing list is fine.
          TOPICS=$$(rpk -X brokers=redpanda:29092 topic list 2>/dev/null \
                    | awk 'NR>1 && $$1 ~ /^reply\./ {print $$1}')
          for t in $$TOPICS; do
            # Skip if any partition has been written to within the stale window.
            HW=$$(rpk -X brokers=redpanda:29092 topic describe -p "$$t" 2>/dev/null \
                  | awk 'NR>1 {print $$5}' | sort -n | tail -1)
            # We do not have a per-topic last-write timestamp without metrics,
            # so heuristic: healthy long-lived inbox owners bootstrap-produce
            # one marker on startup, which moves HW > 0 even before the first
            # real reply. The remaining HW=0 topics are expected to be stale
            # crash leftovers that never made it past bootstrap.
            if [ -z "$$HW" ] || [ "$$HW" = "0" ] || [ "$$HW" = "-" ]; then
              rpk -X brokers=redpanda:29092 topic delete "$$t" 2>/dev/null \
                && echo "[janitor] deleted empty stale topic: $$t" \
                || true
            fi
          done
        done
    networks:
      - modelline_net

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: redpanda-console
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8080}:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - modelline_net

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: minio
    restart: unless-stopped
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-modelline}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-modelline_secret}
    # Loopback-only by default: object downloads go through the infra nginx
    # facade (:8443 /modelline-blobs/* → minio:9000 over the docker network),
    # never the host port. Set MINIO_BIND_ADDR=0.0.0.0 to expose if ever needed.
    ports:
      - "${MINIO_BIND_ADDR:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND_ADDR:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - type: bind
        source: ../.runtime-data/microservice_infra/minio
        target: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - modelline_net

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/modelline-blobs &&
      mc anonymous set none local/modelline-blobs &&
      echo '✓ bucket modelline-blobs ready (private; access via presigned URLs only)'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-modelline}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-modelline_secret}
    networks:
      - modelline_net

  # One-shot TLS bootstrap for the remote admin facade.
  # Existing files in ADMIN_BACKEND_CERTS_DIR are preserved.
  nginx-cert-init:
    build:
      context: .
      dockerfile: nginx/cert-init.Dockerfile
    container_name: modelline-nginx-cert-init
    restart: "no"
    environment:
      CERT_DIR: /certs
    volumes:
      - ${ADMIN_BACKEND_CERTS_DIR:-./nginx/certs}:/certs

  # Nginx reverse proxy — единственный внешний вход в ModelLine.
  #
  # Публикуется как host-порт 8501 (override через NGINX_PORT). Внутри
  # контейнера слушает 80. Маршрутизирует:
  #   /admin/*           → admin:3000 (Next.js, basePath=/admin)
  #   /admin/api/events  → admin:3000 (SSE, без буферизации)
  #   /modelline-blobs/* → minio:9000 (signed object downloads)
  #
  # Поднимается всегда вместе с остальной infra. В local/full stack это
  # browser-facing ingress на :8501; в split deployment этот же nginx
  # остаётся download endpoint-ом backend-хоста для /modelline-blobs/*.
  #
  # Split deployment (8443):
  #   Дополнительный TLS-сервер на порту 8443 — admin facade для удалённого
  #   admin-хоста. Если каталог сертификатов пустой, self-signed cert
  #   будет автоматически создан через nginx-cert-init.
  nginx:
    image: nginx:1.27-alpine
    container_name: modelline-nginx
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_started
      nginx-cert-init:
        condition: service_completed_successfully
    ports:
      - "${NGINX_PORT:-8501}:80"
      - "${ADMIN_BACKEND_PORT:-8443}:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${ADMIN_BACKEND_CERTS_DIR:-./nginx/certs}:/etc/nginx/certs:ro
    networks:
      - modelline_net

networks:
  modelline_net:
    name: modelline_net
