version: "3.9"

services:
  account-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: account_service_api
    restart: unless-stopped
    ports:
      - "5010:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-account-service}
      Jwt__Audience: ${JWT_AUDIENCE:-exchange-app}
      Jwt__AccessTokenExpirationMinutes: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      Jwt__RefreshTokenExpirationDays: ${JWT_REFRESH_EXPIRY_DAYS:-30}
      Password__WorkFactor: ${BCRYPT_WORK_FACTOR:-12}
      Redis__ConnectionString: ${REDIS_URL:-}
      InternalApi__ApiKey: ${INTERNAL_API_KEY}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - account_net
      - modelline_net

  postgres:
    image: postgres:16-alpine
    container_name: account_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-account_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-account_service}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - account_net

  redis:
    image: redis:7-alpine
    container_name: account_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - with-redis
    networks:
      - account_net

volumes:
  postgres_data:
  redis_data:

networks:
  account_net:
    driver: bridge
  modelline_net:
    name: modelline_net
    external: true
