services:
  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: exchange-app/gateway-service:local
    container_name: exchange-gateway
    ports:
      - "5020:5020"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5020
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-exchange-app}
      Jwt__Audience: ${JWT_AUDIENCE:-exchange-app-mobile}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - modelline_net

networks:
  modelline_net:
    name: modelline_net
    external: true
