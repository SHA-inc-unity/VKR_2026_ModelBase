version: "3.9"

services:
  social-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_service_api
    restart: unless-stopped
    ports:
      - "${SOCIAL_BIND_ADDR:-0.0.0.0}:${SOCIAL_API_PORT:-7530}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-account-service}
      Jwt__Audience: ${JWT_AUDIENCE:-exchange-app}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      Kafka__SocialEventsTopic: ${KAFKA_SOCIAL_TOPIC:-events.social.v1}
      AccountService__BaseUrl: ${ACCOUNT_BASE_URL:-http://account_service_api:5000}
      AccountService__InternalApiKey: ${INTERNAL_API_KEY}
      InternalApi__ApiKey: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1388 ' /proc/net/tcp /proc/net/tcp6 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - social_net
      - modelline_net

  postgres:
    image: postgres:16-alpine
    container_name: social_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-social_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - type: bind
        source: ../.runtime-data/microservice_social/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-social_service}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_net

networks:
  social_net:
    driver: bridge
  modelline_net:
    name: modelline_net
    external: true
