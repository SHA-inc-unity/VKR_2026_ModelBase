services:
  # ── Base image builder (shared deps layer) ──────────────────────────────────
  base:
    build:
      context: ..
      dockerfile: microservice_analitic/Dockerfile.base
    image: modelline-base:latest
    profiles:
      - build-base   # built explicitly via: docker compose --profile build-base build base

  # ── Redis (опциональный KV-store для настроек) ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - modelline_net

  # ── FastAPI REST ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - models_data:/app/models
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - modelline_net

  # ── Scheduler (переобучение по расписанию) ────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_AUTOSTART: "false"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    volumes:
      - models_data:/app/models
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "backend.scheduler"]
    profiles:
      - scheduler   # запускается только явно: docker compose --profile scheduler up
    networks:
      - modelline_net

  # ── MLflow (опционально, раскомментировать при необходимости) ───────────────
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:v2.13.0
  #   restart: unless-stopped
  #   command: >
  #     mlflow server
  #     --host 0.0.0.0
  #     --port 5000
  #     --backend-store-uri sqlite:///mlflow.db
  #     --default-artifact-root /mlflow/artifacts
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - mlflow_data:/mlflow
  #   networks:
  #     - modelline_net

volumes:
  redis_data:
  models_data:
  # mlflow_data:

networks:
  modelline_net:
    external: true

